name: Security Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Используем Safety v2 для стабильности в CI без ключа
          pip uninstall -y safety
          pip install "safety>=2.3.0,<3.0.0"
      
      - name: Run Ruff (Linting + Style)
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/
      
      - name: Run Bandit (Security Scan)
        run: |
          bandit -r src/ -f json -o bandit-report.json --severity-level medium
        continue-on-error: true
      
      - name: Run Safety Check (Dependencies)
        run: |
          safety check
      
      - name: Run Pytest (Unit Tests)
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-fail-under=90
      
      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30