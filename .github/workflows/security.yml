name: Security Check

on:
  push:
branches: [main]
  pull_request:
branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install "safety>=3.0.0"
      
      - name: Run Ruff
        run: ruff check src/ tests/ && ruff format --check src/ tests/
      
      - name: Run Bandit
        run: bandit -r src/ -f json -o bandit-report.json --severity-level medium
        continue-on-error: true
      
      - name: Run Safety Scan
        env:
          SAFETY_API_KEY: ${{ secrets.SAFETY_API_KEY }}
        run: |
          if [ -n "$SAFETY_API_KEY" ]; then
            safety scan --key $SAFETY_API_KEY --stage cicd
          else
            safety scan --local --continue-on-error
          fi
      
      - name: Run Pytest
        run: pytest tests/ --cov=src --cov-report=xml --cov-fail-under=90
