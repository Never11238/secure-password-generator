name: Security Check

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  security:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          # Use Safety v3 for modern scanning
          pip install "safety>=3.0.0"
      
      - name: Run Ruff (Linting + Style)
        run: |
          ruff check src/ tests/
          ruff format --check src/ tests/
      
      - name: Run Bandit (Security Scan)
        run: |
          bandit -r src/ -f json -o bandit-report.json --severity-level medium
        continue-on-error: true  
      
      - name: Run Safety Scan (Dependencies)
        run: |
          # Safety v3 scan in CI mode (non-interactive, no API key required)
          # --local: scan locally installed packages
          # --continue-on-error: don't fail CI if vulnerabilities found
          # --ignore 84961: temporarily ignore wheel vulnerability (CVE-2026-24049)
          # --no-interaction: disable prompts for login/register
          safety scan --local --continue-on-error --ignore 84961 --no-interaction || echo "Safety scan completed with warnings"
      
      - name: Run Pytest (Unit Tests)
        run: |
          pytest tests/ --cov=src --cov-report=xml --cov-fail-under=20      
      - name: Upload Bandit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30