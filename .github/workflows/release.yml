name: Build Release Binaries


permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'  

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    
    defaults:
      run:
        shell: bash
    
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run tests before build (sanity check)
        run: |
          pytest tests/ -v

      - name: Build standalone binary with PyInstaller
        shell: bash  
        run: |
          pyinstaller --onefile \
            --name passgen-${{ matrix.os }} \
            --hidden-import=src \
            --hidden-import=src.generator \
            --hidden-import=src.clipboard \
            --hidden-import=src.updater \
            --hidden-import=src.wordlist \
            --collect-all=src \
            src/cli.py

      - name: Verify binary was created
        run: |
          echo "📁 Contents of dist/:"
          # Кроссплатформенная проверка (работает и на Windows, и на Linux/macOS)
          if [ "$RUNNER_OS" == "Windows" ]; then
            dir dist
          else
            ls -la dist/
          fi
          
          echo "🧪 Testing binary --help:"
          # Проверяем наличие файла и запускаем
          if [ -f "dist/passgen-${{ matrix.os }}" ]; then
            ./dist/passgen-${{ matrix.os }} --help
          elif [ -f "dist/passgen-${{ matrix.os }}.exe" ]; then
            ./dist/passgen-${{ matrix.os }}.exe --help
          else
            echo "⚠️ Binary not found in dist/, checking build logs above"
            exit 1
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: passgen-${{ matrix.os }}
          path: dist/passgen-*
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/passgen-*
          body: |
            ## 🔐 Secure Password Generator ${{ github.ref_name }}
            
            ### 📦 Standalone binaries (no Python required):
            - 🪟 Windows: `passgen-windows-latest.exe`
            - 🐧 Linux: `passgen-ubuntu-latest`
            - 🍎 macOS: `passgen-macos-latest`
            
            ### 🚀 Usage:
            ```bash
            # Windows (PowerShell / CMD)
            .\passgen-windows-latest.exe --random --length 16
            
            # Linux / macOS
            chmod +x passgen-ubuntu-latest
            ./passgen-ubuntu-latest --random --length 16
            ```
            
            ### 🔧 All options:
            ```bash
            passgen-<os> --help
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}