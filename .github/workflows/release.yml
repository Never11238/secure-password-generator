name: Build Release Binaries

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  # 🔨 STAGE 1: Build binaries on all OS platforms
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run tests before build (sanity check)
        run: |
          pytest tests/ -v

      - name: Build standalone binary with PyInstaller
        run: |
          pyinstaller --onefile \
            --name passgen-${{ matrix.os }} \
            --hidden-import=src \
            --hidden-import=src.generator \
            --hidden-import=src.clipboard \
            --hidden-import=src.updater \
            --hidden-import=src.wordlist \
            --collect-all=src \
            src/cli.py

      - name: Verify binary was created
        run: |
          echo "📁 Contents of dist/:"
          if [ "$RUNNER_OS" == "Windows" ]; then
            dir dist
          else
            ls -la dist/
          fi
          if [ -f "dist/passgen-${{ matrix.os }}" ]; then
            ./dist/passgen-${{ matrix.os }} --help
          elif [ -f "dist/passgen-${{ matrix.os }}.exe" ]; then
            ./dist/passgen-${{ matrix.os }}.exe --help
          else
            echo "⚠️ Binary not found"
            exit 1
          fi

      # 🪟 WINDOWS: Generate helper scripts with Russian names (using PowerShell for encoding safety)
      - name: Create Windows helper scripts
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $dist = "dist"
          $exe = "passgen-${{ matrix.os }}.exe"
          
          # Helper function to create UTF-8 encoded .bat files WITHOUT BOM (critical for cmd.exe)
          function New-BatFile {
              param([string]$Name, [string]$Content)
              $path = Join-Path $dist $Name
              [System.IO.File]::WriteAllText($path, $Content, (New-Object System.Text.UTF8Encoding $false))
          }
          
          New-BatFile "01_Сгенерировать_пароль_и_скопировать.bat" @"
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"
          echo 🔐 Генерация надёжного пароля...
          $exe --random -l 24 --copy --no-warnings
          echo ✅ Пароль скопирован в буфер обмена!
          pause >nul
          "@
          
          New-BatFile "02_Сгенерировать_фразу_пароль.bat" @"
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"
          echo 🔐 Генерация мнемонической фразы...
          $exe --passphrase --words 5 --capitalize --add-number --copy
          echo ✅ Фраза скопирована в буфер обмена!
          pause >nul
          "@
          
          New-BatFile "03_Проверить_стойкость_пароля.bat" @"
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"
          set /p "PASS=Введите пароль для проверки: "
          $exe --check "%PASS%"
          echo.
          pause
          "@
          
          New-BatFile "04_Хешировать_пароль_Argon2.bat" @"
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"
          set /p "PASS=Введите пароль для хеширования: "
          $exe --hash "%PASS%" --hash-algo argon2
          echo.
          pause
          "@
          
          New-BatFile "05_Обновить_словари_слов.bat" @"
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"
          echo 🌐 Обновление словарей...
          $exe --update-all
          echo ✅ Словари обновлены!
          pause >nul
          "@
          
          # Move all Windows files to a subfolder for organized release
          New-Item -ItemType Directory -Force -Path "dist/Windows" | Out-Null
          Move-Item "dist/$exe" "dist/Windows/"
          Move-Item "dist/*.bat" "dist/Windows/"

      # 🐧/🍎 UNIX: Generate helper scripts with Russian names
      - name: Create Unix helper scripts
        if: matrix.os != 'windows-latest'
        run: |
          cd dist/
          EXE="./passgen-${{ matrix.os }}"
          
          # Determine platform folder name (Linux or macOS)
          PLATFORM_DIR=$(echo "${{ matrix.os }}" | sed 's/-latest//')
          mkdir -p "$PLATFORM_DIR"
          
          cat > "$PLATFORM_DIR/01_Сгенерировать_пароль_и_скопировать.sh" << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          echo "🔐 Генерация надёжного пароля..."
          ./passgen-${{ matrix.os }} --random -l 24 --copy --no-warnings
          echo "✅ Пароль скопирован в буфер обмена!"
          read -p "Нажмите Enter для выхода..."
          EOF
          
          cat > "$PLATFORM_DIR/02_Сгенерировать_фразу_пароль.sh" << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          echo "🔐 Генерация мнемонической фразы..."
          ./passgen-${{ matrix.os }} --passphrase --words 5 --capitalize --add-number --copy
          echo "✅ Фраза скопирована в буфер обмена!"
          read -p "Нажмите Enter для выхода..."
          EOF
          
          cat > "$PLATFORM_DIR/03_Проверить_стойкость_пароля.sh" << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          read -p "Введите пароль для проверки: " PASS
          ./passgen-${{ matrix.os }} --check "$PASS"
          echo ""
          read -p "Нажмите Enter для выхода..."
          EOF
          
          cat > "$PLATFORM_DIR/04_Хешировать_пароль_Argon2.sh" << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          read -p "Введите пароль для хеширования: " PASS
          ./passgen-${{ matrix.os }} --hash "$PASS" --hash-algo argon2
          echo ""
          read -p "Нажмите Enter для выхода..."
          EOF
          
          cat > "$PLATFORM_DIR/05_Обновить_словари_слов.sh" << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          echo "🌐 Обновление словарей..."
          ./passgen-${{ matrix.os }} --update-all
          echo "✅ Словари обновлены!"
          read -p "Нажмите Enter для выхода..."
          EOF
          
          chmod +x "$PLATFORM_DIR"/*.sh
          
          # Move binary to platform folder
          mv "dist/passgen-${{ matrix.os }}" "$PLATFORM_DIR/"

      # 📦 Upload build artifacts (organized by OS folders)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/Windows/  # For Windows; for Unix it will be dist/Linux/ or dist/macOS/
          retention-days: 1
          if-no-files-found: error

  # 🚀 STAGE 2: Create single GitHub Release after all builds complete
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
          pattern: build-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Windows/**/*
            dist/Linux/**/*
            dist/macOS/**/*
          body: |
            ## 🔐 Secure Password Generator ${{ github.ref_name }}
            
            ### 📦 Standalone binaries (no Python required):
            Files are organized by platform for easy access:
            
            #### 🪟 Windows/
            - `passgen-windows-latest.exe` — main executable
            - `01_Сгенерировать_пароль_и_скопировать.bat` → generate & copy strong password
            - `02_Сгенерировать_фразу_пароль.bat` → generate mnemonic passphrase
            - `03_Проверить_стойкость_пароля.bat` → check password strength
            - `04_Хешировать_пароль_Argon2.bat` → hash password with Argon2
            - `05_Обновить_словари_слов.bat` → update EFF wordlists
            
            #### 🐧 Linux/ & 🍎 macOS/
            - `passgen-ubuntu-latest` / `passgen-macos-latest` — main binary
            - `01_Сгенерировать_пароль_и_скопировать.sh` and others — same functionality
            
            ### 🚀 Quick Start:
            #### Windows
            Open `Windows/` folder → double-click any `.bat` file.
            Or via terminal:
            ```powershell
            cd Windows
            .\passgen-windows-latest.exe --random --length 16
            ```
            
            #### Linux / macOS
            ```bash
            cd Linux/  # or macOS/
            chmod +x *.sh
            ./01_Сгенерировать_пароль_и_скопировать.sh
            ```
            
            ### 🔧 All options:
            ```bash
            passgen-<os> --help
            ```
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}