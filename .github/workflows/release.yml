name: Build Release Binaries

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run tests before build (sanity check)
        run: |
          pytest tests/ -v

      - name: Build standalone binary with PyInstaller
        run: |
          pyinstaller --onefile \
            --name passgen-${{ matrix.os }} \
            --hidden-import=src \
            --hidden-import=src.generator \
            --hidden-import=src.clipboard \
            --hidden-import=src.updater \
            --hidden-import=src.wordlist \
            --collect-all=src \
            src/cli.py

      - name: Verify binary was created
        run: |
          echo "📁 Contents of dist/:"
          if [ "$RUNNER_OS" == "Windows" ]; then
            dir dist
          else
            ls -la dist/
          fi
          if [ -f "dist/passgen-${{ matrix.os }}" ]; then
            ./dist/passgen-${{ matrix.os }} --help
          elif [ -f "dist/passgen-${{ matrix.os }}.exe" ]; then
            ./dist/passgen-${{ matrix.os }}.exe --help
          else
            echo "⚠️ Binary not found"
            exit 1
          fi

      # 🪟 WINDOWS: Generate helper scripts with Russian names (PowerShell, no heredoc)
      - name: Create Windows helper scripts
        if: matrix.os == 'windows-latest'
        shell: powershell
        run: |
          $dist = "dist"
          $exe = "passgen-${{ matrix.os }}.exe"
          $batDir = "$dist/Windows"
          
          New-Item -ItemType Directory -Force -Path $batDir | Out-Null
          Move-Item "$dist/$exe" "$batDir/" -Force
          
          function Write-Bat {
              param([string]$Path, [string[]]$Lines)
              $utf8NoBom = New-Object System.Text.UTF8Encoding $false
              [System.IO.File]::WriteAllLines($Path, $Lines, $utf8NoBom)
          }
          
          Write-Bat "$batDir/01_Сгенерировать_пароль_и_скопировать.bat" @(
              '@echo off',
              'chcp 65001 >nul',
              'cd /d "%~dp0"',
              'echo Generating secure password...',
              "$exe --random -l 24 --copy --no-warnings",
              'echo Password copied to clipboard!',
              'pause >nul'
          )
          
          Write-Bat "$batDir/02_Сгенерировать_фразу_пароль.bat" @(
              '@echo off',
              'chcp 65001 >nul',
              'cd /d "%~dp0"',
              'echo Generating mnemonic passphrase...',
              "$exe --passphrase --words 5 --capitalize --add-number --copy",
              'echo Passphrase copied to clipboard!',
              'pause >nul'
          )
          
          Write-Bat "$batDir/03_Проверить_стойкость_пароля.bat" @(
              '@echo off',
              'chcp 65001 >nul',
              'cd /d "%~dp0"',
              'set /p PASS=Enter password to check: ',
              "$exe --check `%PASS%`",
              'echo.',
              'pause'
          )
          
          Write-Bat "$batDir/04_Хешировать_пароль_Argon2.bat" @(
              '@echo off',
              'chcp 65001 >nul',
              'cd /d "%~dp0"',
              'set /p PASS=Enter password to hash: ',
              "$exe --hash `%PASS%` --hash-algo argon2",
              'echo.',
              'pause'
          )
          
          Write-Bat "$batDir/05_Обновить_словари_слов.bat" @(
              '@echo off',
              'chcp 65001 >nul',
              'cd /d "%~dp0"',
              'echo Updating wordlists...',
              "$exe --update-all",
              'echo Wordlists updated!',
              'pause >nul'
          )

      # 🐧/🍎 UNIX: Generate helper scripts (simple echo, no heredoc)
      - name: Create Unix helper scripts
        if: matrix.os != 'windows-latest'
        run: |
          PLATFORM_NAME=$(echo "${{ matrix.os }}" | sed 's/-latest//')
          PLATFORM_DIR="dist/$PLATFORM_NAME"
          
          mkdir -p "$PLATFORM_DIR"
          mv "dist/passgen-${{ matrix.os }}" "$PLATFORM_DIR/"
          
          # Helper: create script with proper escaping
          make_script() {
              local file="$1"
              local desc="$2"
              local cmd="$3"
              local ok="$4"
              
              printf '#!/bin/bash\ncd "$(dirname "$0")"\necho "🔐 %s"\n./passgen-%s %s\necho "✅ %s"\nread -p "Press Enter to exit..."\n' \
                  "$desc" "${{ matrix.os }}" "$cmd" "$ok" > "$PLATFORM_DIR/$file"
              chmod +x "$PLATFORM_DIR/$file"
          }
          
          make_script "01_Сгенерировать_пароль_и_скопировать.sh" \
              "Generating secure password..." \
              "--random -l 24 --copy --no-warnings" \
              "Password copied to clipboard!"
          
          make_script "02_Сгенерировать_фразу_пароль.sh" \
              "Generating mnemonic passphrase..." \
              "--passphrase --words 5 --capitalize --add-number --copy" \
              "Passphrase copied to clipboard!"
          
          # Interactive scripts (check/hash) - written directly with careful quoting
          printf '%s\n' '#!/bin/bash' 'cd "$(dirname "$0")"' 'read -p "Enter password to check: " PASS' "./passgen-${{ matrix.os }} --check \"\$PASS\"" 'echo ""' 'read -p "Press Enter to exit..."' > "$PLATFORM_DIR/03_Проверить_стойкость_пароля.sh"
          chmod +x "$PLATFORM_DIR/03_Проверить_стойкость_пароля.sh"
          
          printf '%s\n' '#!/bin/bash' 'cd "$(dirname "$0")"' 'read -p "Enter password to hash: " PASS' "./passgen-${{ matrix.os }} --hash \"\$PASS\" --hash-algo argon2" 'echo ""' 'read -p "Press Enter to exit..."' > "$PLATFORM_DIR/04_Хешировать_пароль_Argon2.sh"
          chmod +x "$PLATFORM_DIR/04_Хешировать_пароль_Argon2.sh"
          
          make_script "05_Обновить_словари_слов.sh" \
              "Updating wordlists..." \
              "--update-all" \
              "Wordlists updated!"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: ${{ matrix.os == 'windows-latest' && 'dist/Windows' || format('dist/{0}', matrix.os == 'ubuntu-latest' && 'linux' || 'macos') }}
          retention-days: 1
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
          pattern: build-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Windows/**/*
            dist/linux/**/*
            dist/macos/**/*
          body: |
            ## 🔐 Secure Password Generator ${{ github.ref_name }}
            
            ### 📦 Standalone binaries (no Python required):
            Files organized by platform:
            
            #### 🪟 Windows/
            - `passgen-windows-latest.exe` — main executable
            - `01_Сгенерировать_пароль_и_скопировать.bat` → generate & copy password
            - `02_Сгенерировать_фразу_пароль.bat` → generate passphrase
            - `03_Проверить_стойкость_пароля.bat` → check strength
            - `04_Хешировать_пароль_Argon2.bat` → hash with Argon2
            - `05_Обновить_словари_слов.bat` → update wordlists
            
            #### 🐧 Linux/ & 🍎 macOS/
            - `passgen-ubuntu-latest` / `passgen-macos-latest` — main binary
            - `01_Сгенерировать_пароль_и_скопировать.sh` and others — same functionality
            
            ### 🚀 Quick Start:
            #### Windows
            Open `Windows/` → double-click any `.bat`.
            Or: `.\passgen-windows-latest.exe --random --length 16`
            
            #### Linux / macOS
            ```bash
            cd Linux/  # or macOS/
            chmod +x *.sh
            ./01_Сгенерировать_пароль_и_скопировать.sh
            ```
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}