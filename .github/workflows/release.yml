name: Build Release Binaries

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  # 🔨 STAGE 1: Build binaries on all OS platforms
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run tests before build (sanity check)
        run: |
          pytest tests/ -v

      - name: Build standalone binary with PyInstaller
        run: |
          pyinstaller --onefile \
            --name passgen-${{ matrix.os }} \
            --hidden-import=src \
            --hidden-import=src.generator \
            --hidden-import=src.clipboard \
            --hidden-import=src.updater \
            --hidden-import=src.wordlist \
            --collect-all=src \
            src/cli.py

      - name: Verify binary was created
        run: |
          echo "📁 Contents of dist/:"
          if [ "$RUNNER_OS" == "Windows" ]; then
            dir dist
          else
            ls -la dist/
          fi
          if [ -f "dist/passgen-${{ matrix.os }}" ]; then
            ./dist/passgen-${{ matrix.os }} --help
          elif [ -f "dist/passgen-${{ matrix.os }}.exe" ]; then
            ./dist/passgen-${{ matrix.os }}.exe --help
          else
            echo "⚠️ Binary not found"
            exit 1
          fi

      # 🐍 STABLE: Generate helper scripts using Python (avoids shell escaping/parser issues)
      - name: Organize dist and generate helper scripts
        run: |
          python << 'PYEOF'
          import os, shutil

          matrix_os = "${{ matrix.os }}"
          is_win = matrix_os == "windows-latest"
          exe_name = f"passgen-{matrix_os}{'.exe' if is_win else ''}"
          folder = "Windows" if is_win else matrix_os.replace("-latest", "")
          target = os.path.join("dist", folder)
          os.makedirs(target, exist_ok=True)
          
          # Move binary into platform folder
          shutil.move(os.path.join("dist", exe_name), target)

          def write_file(name, content):
              path = os.path.join(target, name)
              # newline='' prevents Python from auto-converting line endings
              with open(path, "w", encoding="utf-8", newline="") as f:
                  f.write(content)
              if not is_win:
                  os.chmod(path, 0o755)

          cmd = exe_name
          if is_win:
              eol = "\r\n"
              write_file("01_Сгенерировать_пароль_и_скопировать.bat", 
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}echo 🔐 Генерация надёжного пароля...{eol}{cmd} --random -l 24 --copy --no-warnings{eol}echo ✅ Пароль скопирован в буфер обмена!{eol}pause >nul")
              write_file("02_Сгенерировать_фразу_пароль.bat",
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}echo 🔐 Генерация мнемонической фразы...{eol}{cmd} --passphrase --words 5 --capitalize --add-number --copy{eol}echo ✅ Фраза скопирована в буфер обмена!{eol}pause >nul")
              write_file("03_Проверить_стойкость_пароля.bat",
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}set /p PASS=Введите пароль для проверки: {eol}{cmd} --check \"%PASS%\"{eol}echo.{eol}pause")
              write_file("04_Хешировать_пароль_Argon2.bat",
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}set /p PASS=Введите пароль для хеширования: {eol}{cmd} --hash \"%PASS%\" --hash-algo argon2{eol}echo.{eol}pause")
              write_file("05_Обновить_словари_слов.bat",
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}echo 🌐 Обновление словарей...{eol}{cmd} --update-all{eol}echo ✅ Словари обновлены!{eol}pause >nul")
          else:
              eol = "\n"
              write_file("01_Сгенерировать_пароль_и_скопировать.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}echo \"🔐 Генерация надёжного пароля...\"{eol}./{cmd} --random -l 24 --copy --no-warnings{eol}echo \"✅ Пароль скопирован в буфер обмена!\"{eol}read -p \"Нажмите Enter для выхода...\"")
              write_file("02_Сгенерировать_фразу_пароль.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}echo \"🔐 Генерация мнемонической фразы...\"{eol}./{cmd} --passphrase --words 5 --capitalize --add-number --copy{eol}echo \"✅ Фраза скопирована в буфер обмена!\"{eol}read -p \"Нажмите Enter для выхода...\"")
              write_file("03_Проверить_стойкость_пароля.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}read -p \"Введите пароль для проверки: \" PASS{eol}./{cmd} --check \"$PASS\"{eol}echo \"\"{eol}read -p \"Нажмите Enter для выхода...\"")
              write_file("04_Хешировать_пароль_Argon2.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}read -p \"Введите пароль для хеширования: \" PASS{eol}./{cmd} --hash \"$PASS\" --hash-algo argon2{eol}echo \"\"{eol}read -p \"Нажмите Enter для выхода...\"")
              write_file("05_Обновить_словари_слов.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}echo \"🌐 Обновление словарей...\"{eol}./{cmd} --update-all{eol}echo \"✅ Словари обновлены!\"{eol}read -p \"Нажмите Enter для выхода...\"")
          PYEOF

      # 📦 Upload all files preserving folder structure
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/
          retention-days: 1
          if-no-files-found: error

  # 🚀 STAGE 2: Create single GitHub Release after all builds complete
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
          pattern: build-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Windows/**/*
            dist/linux/**/*
            dist/macos/**/*
          body: |
            ## 🔐 Secure Password Generator ${{ github.ref_name }}
            
            ### 📦 Standalone binaries (no Python required):
            Files are organized by platform for easy access:
            
            #### 🪟 Windows/
            - `passgen-windows-latest.exe` — main executable
            - `01_Сгенерировать_пароль_и_скопировать.bat` → generate & copy password
            - `02_Сгенерировать_фразу_пароль.bat` → generate passphrase
            - `03_Проверить_стойкость_пароля.bat` → check strength
            - `04_Хешировать_пароль_Argon2.bat` → hash with Argon2
            - `05_Обновить_словари_слов.bat` → update wordlists
            
            #### 🐧 Linux/ & 🍎 macOS/
            - `passgen-ubuntu-latest` / `passgen-macos-latest` — main binary
            - `01_Сгенерировать_пароль_и_скопировать.sh` and others — same functionality
            
            ### 🚀 Quick Start:
            #### Windows
            Open `Windows/` folder → double-click any `.bat` file.
            Or via terminal:
            ```powershell
            cd Windows
            .\passgen-windows-latest.exe --random --length 16
            ```
            
            #### Linux / macOS
            ```bash
            cd Linux/  # or macOS/
            chmod +x *.sh
            ./01_Сгенерировать_пароль_и_скопировать.sh
            ```
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}