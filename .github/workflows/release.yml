name: Build Release Binaries

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  # 🔨 ЭТАП 1: Сборка бинарников на всех ОС
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run tests before build (sanity check)
        run: |
          pytest tests/ -v

      - name: Build standalone binary with PyInstaller
        run: |
          pyinstaller --onefile \
            --name passgen-${{ matrix.os }} \
            --hidden-import=src \
            --hidden-import=src.generator \
            --hidden-import=src.clipboard \
            --hidden-import=src.updater \
            --hidden-import=src.wordlist \
            --collect-all=src \
            src/cli.py

      - name: Verify binary was created
        run: |
          echo "📁 Contents of dist/:"
          if [ "$RUNNER_OS" == "Windows" ]; then
            dir dist
          else
            ls -la dist/
          fi
          if [ -f "dist/passgen-${{ matrix.os }}" ]; then
            ./dist/passgen-${{ matrix.os }} --help
          elif [ -f "dist/passgen-${{ matrix.os }}.exe" ]; then
            ./dist/passgen-${{ matrix.os }}.exe --help
          else
            echo "⚠️ Binary not found"
            exit 1
          fi

      # 🪟 WINDOWS: Helper scripts with Russian names
      - name: Create Windows helper scripts
        if: matrix.os == 'windows-latest'
        run: |
          cd dist/
          EXE="passgen-${{ matrix.os }}.exe"

          cat > "01_Сгенерировать_пароль_и_скопировать.bat" << 'EOFBAT'
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"
          echo 🔐 Генерация надёжного пароля...
          %EXE% --random -l 24 --copy --no-warnings
          echo ✅ Пароль скопирован в буфер обмена!
          pause >nul
          EOFBAT

          cat > "02_Сгенерировать_фразу_пароль.bat" << 'EOFBAT'
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"
          echo 🔐 Генерация мнемонической фразы...
          %EXE% --passphrase --words 5 --capitalize --add-number --copy
          echo ✅ Фраза скопирована в буфер обмена!
          pause >nul
          EOFBAT

          cat > "03_Проверить_стойкость_пароля.bat" << 'EOFBAT'
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"
          set /p "PASS=Введите пароль для проверки: "
          %EXE% --check "%PASS%"
          echo.
          pause
          EOFBAT

          cat > "04_Хешировать_пароль_Argon2.bat" << 'EOFBAT'
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"
          set /p "PASS=Введите пароль для хеширования: "
          %EXE% --hash "%PASS%" --hash-algo argon2
          echo.
          pause
          EOFBAT

          cat > "05_Обновить_словари_слов.bat" << 'EOFBAT'
          @echo off
          chcp 65001 >nul
          cd /d "%~dp0"
          echo 🌐 Обновление словарей...
          %EXE% --update-all
          echo ✅ Словари обновлены!
          pause >nul
          EOFBAT

      # 🐧/🍎 UNIX: Helper scripts with Russian names
      - name: Create Unix helper scripts
        if: matrix.os != 'windows-latest'
        run: |
          cd dist/
          EXE="./passgen-${{ matrix.os }}"

          cat > "01_Сгенерировать_пароль_и_скопировать.sh" << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          echo "🔐 Генерация надёжного пароля..."
          $EXE --random -l 24 --copy --no-warnings
          echo "✅ Пароль скопирован в буфер обмена!"
          read -p "Нажмите Enter для выхода..."
          EOF

          cat > "02_Сгенерировать_фразу_пароль.sh" << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          echo "🔐 Генерация мнемонической фразы..."
          $EXE --passphrase --words 5 --capitalize --add-number --copy
          echo "✅ Фраза скопирована в буфер обмена!"
          read -p "Нажмите Enter для выхода..."
          EOF

          cat > "03_Проверить_стойкость_пароля.sh" << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          read -p "Введите пароль для проверки: " PASS
          $EXE --check "$PASS"
          echo ""
          read -p "Нажмите Enter для выхода..."
          EOF

          cat > "04_Хешировать_пароль_Argon2.sh" << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          read -p "Введите пароль для хеширования: " PASS
          $EXE --hash "$PASS" --hash-algo argon2
          echo ""
          read -p "Нажмите Enter для выхода..."
          EOF

          cat > "05_Обновить_словари_слов.sh" << 'EOF'
          #!/bin/bash
          cd "$(dirname "$0")"
          echo "🌐 Обновление словарей..."
          $EXE --update-all
          echo "✅ Словари обновлены!"
          read -p "Нажмите Enter для выхода..."
          EOF

          chmod +x *.sh

      # 📦 Загрузка артефактов (не релиз!)
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/
          retention-days: 1
          if-no-files-found: error

  # 🚀 ЭТАП 2: Создание релиза (запускается ПОСЛЕ всех сборок)
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
          pattern: build-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
          body: |
            ## 🔐 Secure Password Generator ${{ github.ref_name }}
            
            ### 📦 Standalone binaries (no Python required):
            Каждый архив содержит готовые скрипты с русскими названиями:
            
            #### 🪟 Windows
            - `passgen-windows-latest.exe` — основной исполняемый файл
            - `01_Сгенерировать_пароль_и_скопировать.bat` → мгновенная генерация + копирование
            - `02_Сгенерировать_фразу_пароль.bat` → мнемоническая фраза
            - `03_Проверить_стойкость_пароля.bat` → оценка безопасности пароля
            - `04_Хешировать_пароль_Argon2.bat` → безопасное хеширование
            - `05_Обновить_словари_слов.bat` → загрузка свежих wordlists
            
            #### 🐧 Linux / 🍎 macOS
            - `passgen-ubuntu-latest` / `passgen-macos-latest` — бинарник
            - `01_Сгенерировать_пароль_и_скопировать.sh` и др. — аналогичные скрипты
            
            ### 🚀 Быстрый старт:
            #### Windows
            Просто дважды кликните по любому `.bat` файлу.
            Или через терминал:
            ```powershell
            .\passgen-windows-latest.exe --random --length 16
            ```
            
            #### Linux / macOS
            ```bash
            chmod +x 01_Сгенерировать_пароль_и_скопировать.sh
            ./01_Сгенерировать_пароль_и_скопировать.sh
            ```
            
            ### 🔧 Все опции:
            ```bash
            passgen-<os> --help
            ```
          draft: false
          prerelease: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}