name: Build Release Binaries

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run tests
        run: pytest tests/ -v

      - name: Build binary with PyInstaller
        run: |
          pyinstaller --onefile \
            --name passgen-${{ matrix.os }} \
            --hidden-import=src \
            --hidden-import=src.generator \
            --hidden-import=src.clipboard \
            --hidden-import=src.updater \
            --hidden-import=src.wordlist \
            --collect-all=src \
            src/cli.py

      - name: Verify binary
        run: |
          echo "Checking dist/ contents..."
          if [ "$RUNNER_OS" == "Windows" ]; then
            dir dist
          else
            ls -la dist/
          fi
          if [ -f "dist/passgen-${{ matrix.os }}" ]; then
            ./dist/passgen-${{ matrix.os }} --help
          elif [ -f "dist/passgen-${{ matrix.os }}.exe" ]; then
            ./dist/passgen-${{ matrix.os }}.exe --help
          else
            echo "ERROR: Binary not found"
            exit 1
          fi

      - name: Generate helper scripts
        run: |
          python << 'PYEOF'
          import os, shutil

          matrix_os = "${{ matrix.os }}"
          is_win = matrix_os == "windows-latest"
          exe_name = f"passgen-{matrix_os}{'.exe' if is_win else ''}"
          
          if matrix_os == "ubuntu-latest":
              folder, prefix = "Linux", "Linux"
          elif matrix_os == "macos-latest":
              folder, prefix = "macOS", "macOS"
          else:
              folder, prefix = "Windows", "Windows"
              
          target = os.path.join("dist", folder)
          os.makedirs(target, exist_ok=True)
          shutil.move(os.path.join("dist", exe_name), target)

          def write_file(name, content):
              path = os.path.join(target, name)
              with open(path, "w", encoding="utf-8", newline="") as f:
                  f.write(content)
              if not is_win:
                  os.chmod(path, 0o755)

          cmd = exe_name
          if is_win:
              eol = "\r\n"
              write_file(f"{prefix}_01_Generate_Password.bat", 
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}echo Generating secure password...{eol}{cmd} --random -l 24 --copy --no-warnings{eol}echo Copied to clipboard!{eol}pause >nul")
              write_file(f"{prefix}_02_Generate_Passphrase.bat",
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}echo Generating passphrase...{eol}{cmd} --passphrase --words 5 --capitalize --add-number --copy{eol}echo Copied!{eol}pause >nul")
              write_file(f"{prefix}_03_Check_Password.bat",
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}set /p PASS=Enter password to check: {eol}{cmd} --check \"%PASS%\"{eol}echo.{eol}pause")
              write_file(f"{prefix}_04_Hash_Password.bat",
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}set /p PASS=Enter password to hash: {eol}{cmd} --hash \"%PASS%\" --hash-algo argon2{eol}echo.{eol}pause")
              write_file(f"{prefix}_05_Update_Wordlists.bat",
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}echo Updating wordlists...{eol}{cmd} --update-all{eol}echo Done!{eol}pause >nul")
          else:
              eol = "\n"
              write_file(f"{prefix}_01_Generate_Password.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}echo \"Generating secure password...\"{eol}./{cmd} --random -l 24 --copy --no-warnings{eol}echo \"Copied to clipboard!\"{eol}read -p \"Press Enter to exit...\"")
              write_file(f"{prefix}_02_Generate_Passphrase.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}echo \"Generating passphrase...\"{eol}./{cmd} --passphrase --words 5 --capitalize --add-number --copy{eol}echo \"Copied!\"{eol}read -p \"Press Enter to exit...\"")
              write_file(f"{prefix}_03_Check_Password.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}read -p \"Enter password to check: \" PASS{eol}./{cmd} --check \"$PASS\"{eol}read -p \"Press Enter to exit...\"")
              write_file(f"{prefix}_04_Hash_Password.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}read -p \"Enter password to hash: \" PASS{eol}./{cmd} --hash \"$PASS\" --hash-algo argon2{eol}read -p \"Press Enter to exit...\"")
              write_file(f"{prefix}_05_Update_Wordlists.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}echo \"Updating wordlists...\"{eol}./{cmd} --update-all{eol}echo \"Done!\"{eol}read -p \"Press Enter to exit...\"")
          PYEOF

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/
          retention-days: 1

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
          pattern: build-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Windows/**/*
            dist/Linux/**/*
            dist/macOS/**/*
          body: |
            ## 🔐 Secure Password Generator ${{ github.ref_name }}
            
            ### 📦 Standalone binaries
            Organized by platform with ready-to-run helper scripts:
            
            - 🪟 `Windows/` → `passgen-windows-latest.exe` + `Windows_*.bat`
            - 🐧 `Linux/` → `passgen-ubuntu-latest` + `Linux_*.sh`
            - 🍎 `macOS/` → `passgen-macos-latest` + `macOS_*.sh`
            
            ### 🚀 Quick Start
            1. Download your platform folder
            2. Double-click `*_01_Generate_*.bat` / `.sh`
            3. Or run in terminal: `./passgen-<os> --random --length 16`
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}