name: Build Release Binaries

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run tests before build (sanity check)
        run: |
          pytest tests/ -v

      - name: Build standalone binary with PyInstaller
        run: |
          pyinstaller --onefile \
            --name passgen-${{ matrix.os }} \
            --hidden-import=src \
            --hidden-import=src.generator \
            --hidden-import=src.clipboard \
            --hidden-import=src.updater \
            --hidden-import=src.wordlist \
            --collect-all=src \
            src/cli.py

      - name: Verify binary was created
        run: |
          echo "📁 Contents of dist/:"
          if [ "$RUNNER_OS" == "Windows" ]; then
            dir dist
          else
            ls -la dist/
          fi
          if [ -f "dist/passgen-${{ matrix.os }}" ]; then
            ./dist/passgen-${{ matrix.os }} --help
          elif [ -f "dist/passgen-${{ matrix.os }}.exe" ]; then
            ./dist/passgen-${{ matrix.os }}.exe --help
          else
            echo "⚠️ Binary not found"
            exit 1
          fi

      # 🐍 Generate helper scripts with UNIQUE names (platform prefix)
      - name: Organize dist and generate helper scripts
        run: |
          python << 'PYEOF'
          import os, shutil

          matrix_os = "${{ matrix.os }}"
          is_win = matrix_os == "windows-latest"
          exe_name = f"passgen-{matrix_os}{'.exe' if is_win else ''}"
          
          # Standard folder names for organization (not used in release filenames)
          if matrix_os == "ubuntu-latest":
              folder = "Linux"
              prefix = "Linux"
          elif matrix_os == "macos-latest":
              folder = "macOS"
              prefix = "macOS"
          else:
              folder = "Windows"
              prefix = "Windows"
              
          target = os.path.join("dist", folder)
          os.makedirs(target, exist_ok=True)
          
          # Move binary into platform folder (keep original name for local use)
          shutil.move(os.path.join("dist", exe_name), target)

          def write_file(name, content):
              path = os.path.join(target, name)
              with open(path, "w", encoding="utf-8", newline="") as f:
                  f.write(content)
              if not is_win:
                  os.chmod(path, 0o755)

          cmd = exe_name
          if is_win:
              eol = "\r\n"
              # Windows scripts with Windows_ prefix
              write_file(f"{prefix}_01_Сгенерировать_пароль_и_скопировать.bat", 
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}echo 🔐 Генерация надёжного пароля...{eol}{cmd} --random -l 24 --copy --no-warnings{eol}echo ✅ Пароль скопирован в буфер обмена!{eol}pause >nul")
              write_file(f"{prefix}_02_Сгенерировать_фразу_пароль.bat",
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}echo 🔐 Генерация мнемонической фразы...{eol}{cmd} --passphrase --words 5 --capitalize --add-number --copy{eol}echo ✅ Фраза скопирована в буфер обмена!{eol}pause >nul")
              write_file(f"{prefix}_03_Проверить_стойкость_пароля.bat",
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}set /p PASS=Введите пароль для проверки: {eol}{cmd} --check \"%PASS%\"{eol}echo.{eol}pause")
              write_file(f"{prefix}_04_Хешировать_пароль_Argon2.bat",
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}set /p PASS=Введите пароль для хеширования: {eol}{cmd} --hash \"%PASS%\" --hash-algo argon2{eol}echo.{eol}pause")
              write_file(f"{prefix}_05_Обновить_словари_слов.bat",
                  f"@echo off{eol}chcp 65001 >nul{eol}cd /d \"%~dp0\"{eol}echo 🌐 Обновление словарей...{eol}{cmd} --update-all{eol}echo ✅ Словари обновлены!{eol}pause >nul")
          else:
              eol = "\n"
              # Unix scripts with Linux_ or macOS_ prefix
              write_file(f"{prefix}_01_Сгенерировать_пароль_и_скопировать.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}echo \"🔐 Генерация надёжного пароля...\"{eol}./{cmd} --random -l 24 --copy --no-warnings{eol}echo \"✅ Пароль скопирован в буфер обмена!\"{eol}read -p \"Нажмите Enter для выхода...\"")
              write_file(f"{prefix}_02_Сгенерировать_фразу_пароль.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}echo \"🔐 Генерация мнемонической фразы...\"{eol}./{cmd} --passphrase --words 5 --capitalize --add-number --copy{eol}echo \"✅ Фраза скопирована в буфер обмена!\"{eol}read -p \"Нажмите Enter для выхода...\"")
              write_file(f"{prefix}_03_Проверить_стойкость_пароля.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}read -p \"Введите пароль для проверки: \" PASS{eol}./{cmd} --check \"$PASS\"{eol}echo \"\"{eol}read -p \"Нажмите Enter для выхода...\"")
              write_file(f"{prefix}_04_Хешировать_пароль_Argon2.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}read -p \"Введите пароль для хеширования: \" PASS{eol}./{cmd} --hash \"$PASS\" --hash-algo argon2{eol}echo \"\"{eol}read -p \"Нажмите Enter для выхода...\"")
              write_file(f"{prefix}_05_Обновить_словари_слов.sh",
                  f"#!/bin/bash{eol}cd \"$(dirname \"$0\")\"{eol}echo \"🌐 Обновление словарей...\"{eol}./{cmd} --update-all{eol}echo \"✅ Словари обновлены!\"{eol}read -p \"Нажмите Enter для выхода...\"")
          PYEOF

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.os }}
          path: dist/
          retention-days: 1
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true
          pattern: build-*

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Windows/**/*
            dist/Linux/**/*
            dist/macOS/**/*
          body: |
            ## 🔐 Secure Password Generator ${{ github.ref_name }}
            
            ### 📦 Standalone binaries (no Python required):
            All files are in a flat structure with platform prefixes for clarity:
            
            #### 🪟 Windows
            - `passgen-windows-latest.exe` — main executable
            - `Windows_01_Сгенерировать_пароль_и_скопировать.bat` → generate & copy password
            - `Windows_02_Сгенерировать_фразу_пароль.bat` → generate passphrase
            - `Windows_03_Проверить_стойкость_пароля.bat` → check strength
            - `Windows_04_Хешировать_пароль_Argon2.bat` → hash with Argon2
            - `Windows_05_Обновить_словари_слов.bat` → update wordlists
            
            #### 🐧 Linux
            - `passgen-ubuntu-latest` — main binary
            - `Linux_01_Сгенерировать_пароль_и_скопировать.sh` → generate & copy password
            - `Linux_02_Сгенерировать_фразу_пароль.sh` → generate passphrase
            - `Linux_03_Проверить_стойкость_пароля.sh` → check strength
            - `Linux_04_Хешировать_пароль_Argon2.sh` → hash with Argon2
            - `Linux_05_Обновить_словари_слов.sh` → update wordlists
            
            #### 🍎 macOS
            - `passgen-macos-latest` — main binary
            - `macOS_01_Сгенерировать_пароль_и_скопировать.sh` → generate & copy password
            - `macOS_02_Сгенерировать_фразу_пароль.sh` → generate passphrase
            - `macOS_03_Проверить_стойкость_пароля.sh` → check strength
            - `macOS_04_Хешировать_пароль_Argon2.sh` → hash with Argon2
            - `macOS_05_Обновить_словари_слов.sh` → update wordlists
            
            ### 🚀 Quick Start:
            #### Windows
            Download `passgen-windows-latest.exe` and any `Windows_*.bat` file.
            Double-click a `.bat` file to run instantly.
            Or via terminal:
            ```powershell
            .\passgen-windows-latest.exe --random --length 16
            ```
            
            #### Linux / macOS
            Download the binary and any `Linux_*.sh` or `macOS_*.sh` file.
            Make executable and run:
            ```bash
            chmod +x Linux_01_Сгенерировать_пароль_и_скопировать.sh
            ./Linux_01_Сгенерировать_пароль_и_скопировать.sh
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}