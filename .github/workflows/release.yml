name: Build Release Binaries

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.11"]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install pyinstaller

      - name: Run tests before build (sanity check)
        run: |
          pytest tests/ -v

      - name: Build standalone binary with PyInstaller
        run: |
          pyinstaller --onefile \
            --name passgen-${{ matrix.os }} \
            --hidden-import=src \
            --hidden-import=src.generator \
            --hidden-import=src.clipboard \
            --hidden-import=src.updater \
            --hidden-import=src.wordlist \
            --collect-all=src \
            src/cli.py

      - name: Verify binary was created
        run: |
          echo "📁 Contents of dist/:"
          if [ "$RUNNER_OS" == "Windows" ]; then
            dir dist
          else
            ls -la dist/
          fi
          
          echo "🧪 Testing binary --help:"
          if [ -f "dist/passgen-${{ matrix.os }}" ]; then
            ./dist/passgen-${{ matrix.os }} --help
          elif [ -f "dist/passgen-${{ matrix.os }}.exe" ]; then
            ./dist/passgen-${{ matrix.os }}.exe --help
          else
            echo "⚠️ Binary not found in dist/"
            exit 1
          fi

      # 🪟 WINDOWS: Генерация всех .bat скриптов
      - name: Create Windows helper scripts
        if: matrix.os == 'windows-latest'
        run: |
          cd dist/
          EXE="passgen-${{ matrix.os }}.exe"

          cat > gen_random.bat << EOF
          @echo off
          chcp 65001 >nul
          cd /d "%%~dp0"
          echo 🔐 Generating secure random password...
          %EXE% --random -l 24 --copy --no-warnings
          echo ✅ Copied to clipboard!
          pause >nul
          EOF

          cat > gen_passphrase.bat << EOF
          @echo off
          chcp 65001 >nul
          cd /d "%%~dp0"
          echo 🔐 Generating secure passphrase...
          %EXE% --passphrase --words 5 --capitalize --add-number --copy
          echo ✅ Passphrase copied to clipboard!
          pause >nul
          EOF

          cat > check_password.bat << EOF
          @echo off
          chcp 65001 >nul
          cd /d "%%~dp0"
          set /p "PASS=Enter password to check: "
          %EXE% --check "%%PASS%%"
          echo.
          pause
          EOF

          cat > hash_password.bat << EOF
          @echo off
          chcp 65001 >nul
          cd /d "%%~dp0"
          set /p "PASS=Enter password to hash: "
          %EXE% --hash "%%PASS%%" --hash-algo argon2
          echo.
          pause
          EOF

          cat > update_wordlists.bat << EOF
          @echo off
          chcp 65001 >nul
          cd /d "%%~dp0"
          echo 🌐 Updating wordlists...
          %EXE% --update-all
          echo ✅ Wordlists updated!
          pause >nul
          EOF

      # 🐧/🍎 UNIX: Генерация всех .sh скриптов
      - name: Create Unix helper scripts
        if: matrix.os != 'windows-latest'
        run: |
          cd dist/
          EXE="./passgen-${{ matrix.os }}"

          cat > gen_random.sh << EOF
          #!/bin/bash
          cd "\$(dirname "\$0")"
          echo "🔐 Generating secure random password..."
          $EXE --random -l 24 --copy --no-warnings
          echo "✅ Copied to clipboard!"
          read -p "Press Enter to exit..."
          EOF

          cat > gen_passphrase.sh << EOF
          #!/bin/bash
          cd "\$(dirname "\$0")"
          echo "🔐 Generating secure passphrase..."
          $EXE --passphrase --words 5 --capitalize --add-number --copy
          echo "✅ Passphrase copied to clipboard!"
          read -p "Press Enter to exit..."
          EOF

          cat > check_password.sh << EOF
          #!/bin/bash
          cd "\$(dirname "\$0")"
          read -p "Enter password to check: " PASS
          $EXE --check "\$PASS"
          echo ""
          read -p "Press Enter to exit..."
          EOF

          cat > hash_password.sh << EOF
          #!/bin/bash
          cd "\$(dirname "\$0")"
          read -p "Enter password to hash: " PASS
          $EXE --hash "\$PASS" --hash-algo argon2
          echo ""
          read -p "Press Enter to exit..."
          EOF

          cat > update_wordlists.sh << EOF
          #!/bin/bash
          cd "\$(dirname "\$0")"
          echo "🌐 Updating wordlists..."
          $EXE --update-all
          echo "✅ Wordlists updated!"
          read -p "Press Enter to exit..."
          EOF

          chmod +x *.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: passgen-${{ matrix.os }}
          path: dist/
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: |
            ## 🔐 Secure Password Generator ${{ github.ref_name }}
            
            ### 📦 Standalone binaries (no Python required):
            Each platform includes ready-to-run helper scripts:
            - 🪟 **Windows**: `passgen-windows-latest.exe` + `gen_*.bat` files
            - 🐧 **Linux**: `passgen-ubuntu-latest` + `gen_*.sh` files
            - 🍎 **macOS**: `passgen-macos-latest` + `gen_*.sh` files
            
            ### 🚀 Quick Start:
            #### Windows
            Double-click any `.bat` file to run instantly:
            - `gen_random.bat` → Generate & copy strong password
            - `gen_passphrase.bat` → Generate mnemonic passphrase
            - `check_password.bat` → Test strength of existing password
            - `hash_password.bat` → Hash password with Argon2
            - `update_wordlists.bat` → Update EFF wordlists
            
            Or via terminal:
            ```powershell
            .\passgen-windows-latest.exe --random --length 16
            ```
            
            #### Linux / macOS
            Make scripts executable once, then double-click or run:
            ```bash
            chmod +x gen_*.sh
            ./gen_random.sh
            ```
            
            ### 🔧 All options:
            ```bash
            passgen-<os> --help
            ```
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}