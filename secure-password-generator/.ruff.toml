# Ruff configuration for secure-password-generator

line-length = 100
target-version = "py38"

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort (imports sorting)
    "S",   # bandit (security checks)
    "B",   # flake8-bugbear
    "UP",  # pyupgrade (syntax for newer Python)
    "RUF", # ruff-specific rules
]

ignore = [
    "E501",  # Line too long (handled by formatter)
    "S101",  # Use of assert (needed for tests)
    "S404",  # subprocess module (needed for clipboard)
    "S603",  # subprocess without shell=True (safe usage)
    "S607",  # subprocess with partial path (added for clipboard tools)
]

[lint.per-file-ignores]
"tests/*.py" = [
    "S101",  # Allow assert in tests
    "S105",  # Allow hardcoded passwords in tests
]
"src/cli.py" = [
    "S101",  # Allow assert if needed
    "S603",  # subprocess for clipboard tools
]

[lint.isort]
known-first-party = ["src"]
combine-as-imports = true

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
skip-magic-trailing-comma = false